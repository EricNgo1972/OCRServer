name: Manual Release Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version ID for the release package
        required: true
        type: string
      target_os:
        description: Release target
        required: true
        type: choice
        options:
          - windows
          - linux

permissions:
  contents: write

jobs:
  release-package:
    name: Create Release Package
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      PROJECT_PATH: OCRServer.csproj
      NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve package settings
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.version }}"
          TARGET_OS="${{ inputs.target_os }}"

          if [[ -z "$VERSION" ]]; then
            echo "Version input is required." >&2
            exit 1
          fi

          case "$TARGET_OS" in
            windows)
              echo "runtime=win-x64" >> "$GITHUB_OUTPUT"
              echo "archive_name=OCRServer-${VERSION}-windows.zip" >> "$GITHUB_OUTPUT"
              echo "package_dir=release/OCRServer-${VERSION}-windows" >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo "runtime=linux-x64" >> "$GITHUB_OUTPUT"
              echo "archive_name=OCRServer-${VERSION}-linux.tar.gz" >> "$GITHUB_OUTPUT"
              echo "package_dir=release/OCRServer-${VERSION}-linux" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported target_os: $TARGET_OS" >&2
              exit 1
              ;;
          esac

          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_name=OCRServer v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create isolated NuGet config
        shell: bash
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/NuGet.config" <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="spc" value="https://spcnugets20200103080220.azurewebsites.net/nuget" />
            </packageSources>
          </configuration>
          EOF

      - name: Restore
        timeout-minutes: 10
        run: >
          dotnet restore ${{ env.PROJECT_PATH }}
          --configfile "$RUNNER_TEMP/NuGet.config"
          --runtime ${{ steps.vars.outputs.runtime }}
          --disable-parallel
          --ignore-failed-sources
          /p:NuGetAudit=false

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ steps.vars.outputs.runtime }}
          --self-contained false
          --no-restore
          /p:Version=${{ inputs.version }}
          --output ${{ steps.vars.outputs.package_dir }}

      - name: Package Windows release
        if: ${{ inputs.target_os == 'windows' }}
        shell: bash
        run: |
          set -euo pipefail
          cd release
          zip -r "${{ steps.vars.outputs.archive_name }}" "$(basename "${{ steps.vars.outputs.package_dir }}")"

      - name: Package Linux release
        if: ${{ inputs.target_os == 'linux' }}
        shell: bash
        run: |
          set -euo pipefail
          cd release
          tar -czf "${{ steps.vars.outputs.archive_name }}" "$(basename "${{ steps.vars.outputs.package_dir }}")"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.vars.outputs.tag }}"
          RELEASE_NAME="${{ steps.vars.outputs.release_name }}"
          ASSET_PATH="release/${{ steps.vars.outputs.archive_name }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET_PATH" --clobber
          else
            gh release create "$TAG" "$ASSET_PATH" --title "$RELEASE_NAME"
          fi
