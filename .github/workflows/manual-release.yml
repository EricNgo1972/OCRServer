name: Manual Build And Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version 
        required: true
        type: string
      target:
        description: Target platform to build
        required: true
        type: choice
        options:
          - linux
          - windows
          - both

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            rid: linux-x64
            os: ubuntu-latest
          - target: windows
            rid: win-x64
            os: windows-latest

    steps:
      - name: Skip if not selected
        if: ${{ inputs.target != 'both' && inputs.target != matrix.target }}
        run: echo "Skipping ${{ matrix.target }}" && exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OCRServer.csproj

      - name: Publish
        shell: pwsh
        run: >
          dotnet publish OCRServer.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained false
          -o "publish/${{ matrix.target }}"
          /p:Version=${{ inputs.version }}

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          $zipName = "OCRServer-${{ inputs.version }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "publish/${{ matrix.target }}/*" -DestinationPath "artifacts/$zipName" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: artifacts/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/*.zip